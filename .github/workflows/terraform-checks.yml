# .github/workflows/terraform-checks.yml
name: Terraform Checks

on:
  pull_request:
    branches: [dev, main]

permissions:
  id-token: write
  contents: read

jobs:
  validate:
      name: Validate
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Setup Terraform
          uses: hashicorp/setup-terraform@v3

        - name: Terraform Init
          run: terraform -chdir=infra init -backend=false

        - name: Terraform Validate
          run: terraform -chdir=infra validate

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format
        working-directory: infra
        run: terraform fmt -check -recursive

  tflint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v4

      - name: Init tflint
        run: tflint --init

      - name: Run tflint
        run: |
          tflint --chdir=infra --config=$GITHUB_WORKSPACE/.tflint.hcl
          if [ -d "modules" ]; then
            tflint --chdir=modules --recursive --config=$GITHUB_WORKSPACE/.tflint.hcl
          fi

  gitleaks:
    name: Secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy security scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: 'config'
          scan-ref: 'infra'
          severity: 'MEDIUM,HIGH,CRITICAL'
          exit-code: '1'
          format: 'table'
